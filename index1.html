<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Typing Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            margin: 0;
            background: url('static/outer-space-cosmos-stars-background-600nw-2153688383.webp') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-size: 24px;
            text-align: center;
        }
        canvas {
            display: block;
            margin: auto;
        }
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modal button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
        }
        .easy { background-color: green; }
        .medium { background-color: orange; }
        .hard { background-color: red; }

        .game-over-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            margin-bottom: 5px;
        }
        .game-over-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .game-over-buttons button {
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .try-again {
            background-color: #4CAF50;
            color: white;
        }
        .exit {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div id="difficulty-modal" class="modal">
        <h2>Choose Difficulty</h2>
        <button class="easy" onclick="startGame('easy')">Easy</button>
        <button class="medium" onclick="startGame('medium')">Medium</button>
        <button class="hard" onclick="startGame('hard')">Hard</button>
    </div>
    <div id="game-over-container" class="game-over-container">
        <h1 style="color: red;">GAME OVER</h1>
        <p id="final-score" style="color: white; margin-bottom: 10px; font-size: 40px;"></p>
        <div class="game-over-buttons">
            <button class="try-again" onclick="restartGame()">Try Again</button>
            <button class="exit" onclick="exitGame()">Exit</button>
        </div>
    </div>

    <script>
        let words = [];
        let userInput = "";
        let score = 0;
        let lives = 5;
        let explosions = [];
        let lasers = [];
        let rocketFlames;
        let rocketX;
        let gameOver = false;
        let timer = 60;
        let timerInterval;
        let wordSpawnRate = 5000;
        let speed = 0.5;
        let targetX = null;
        let borderY = 450;
        let rocketY = 500;
        let rocketWidth = 350;
        let rocketHeight = 320;
        let spaceBg;
        let backspaceInterval = null;
        let backspaceDelay = 300;
        let backspaceSpeed = 100;
        let currentDifficulty = "easy";
        let availableWords = [];

        // Audio variables
        let menuMusic;
        let gameMusic;
        let gameOverSound;
        let explosionSound;
        let currentAudio = null;

        const everydayWords = [
            "chair", "table", "lamp", "blanket", "pillow",
            "sofa", "mirror", "broom", "dish", "spoon",
            "apple", "banana", "milk", "coffee", "bread",
            "pasta", "cheese", "water", "juice", "cookie",
            "shirt", "pants", "socks", "jacket", "dress",
            "shoes", "hat", "scarf", "gloves", "belt",
            "tree", "flower", "grass", "cloud", "river",
            "mountain", "sun", "moon", "star", "rain",
            "car", "bike", "bus", "train", "plane",
            "taxi", "boat", "truck", "scooter", "subway"
        ];

        function preload() {
            rocketFlames = loadImage('static/igor-schteinberg-cartoon-rocke-unscreen.gif');
            spaceBg = loadImage('static/supawork-d6eaa225fbe34a529710cb81ab131702.gif');
            
            // Load audio files
            menuMusic = loadSound('static/space-chords-loop-310493.mp3');
            gameMusic = loadSound('static/star-wars-style-battle-music-148641.mp3');
            gameOverSound = loadSound('static/mario_world_ending.mp3');
            explosionSound = loadSound('static/laser-gun-105781.mp3'); 
        }

        function setup() {
            let cnv = createCanvas(800, 600);
            cnv.parent(document.body);
            cnv.style('display', 'none');
            cnv.style('margin', 'auto');
            rocketX = width / 2;
            textSize(24);
            
            // Start menu music
            menuMusic.loop();
            currentAudio = menuMusic;
            
            // Prevent space bar from scrolling page
            window.addEventListener('keydown', function(e) {
                if(e.keyCode == 32 && e.target == document.body) {
                    e.preventDefault();
                }
            });
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            document.getElementById("difficulty-modal").style.display = "none";
            let cnv = document.querySelector("canvas");
            cnv.style.display = "block";
            
            // Switch to game music
            if (currentAudio) {
                currentAudio.stop();
            }
            gameMusic.loop();
            currentAudio = gameMusic;
            
            // Reset game state
            availableWords = [...everydayWords];
            words = [];
            score = 0;
            lives = 5;
            gameOver = false;
            timer = 60;
            userInput = "";

            if (difficulty === "easy") {
                wordSpawnRate = 2000;
                speed = 0.3;
            } else if (difficulty === "medium") {
                wordSpawnRate = 2000;
                speed = 0.5;
            } else if (difficulty === "hard") {
                wordSpawnRate = 2000;
                speed = 0.8;
            }

            clearInterval(timerInterval);
            setInterval(spawnWord, wordSpawnRate);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function draw() {
            background(spaceBg);
            
            image(rocketFlames, rocketX - 175, rocketY - 110, rocketWidth, rocketHeight);
            
            stroke(255, 0, 0);
            line(0, borderY, width, borderY);
            noStroke();

            if (gameOver) {
                clearInterval(timerInterval);
                document.getElementById("game-over-container").style.display = "flex";
                document.getElementById("final-score").innerText = `Your Score: ${score}`;
                
                // Play game over sound (only once)
                if (currentAudio !== gameOverSound) {
                    if (currentAudio) {
                        currentAudio.stop();
                    }
                    gameOverSound.play();
                    currentAudio = gameOverSound;
                }
                return;
            }

            fill(255);
            text(`Score: ${score}`, 10, 30);
            text(`Lives: ${"❤️".repeat(lives)}`, 10, 60);
            text(`Type: ${userInput}`, 10, 90);
            text(`Time: ${timer}s`, 10, 120);
            
            if (targetX !== null) {
                if (abs(rocketX - targetX) < 2) {
                    rocketX = targetX;
                    targetX = null;
                } else {
                    rocketX += (targetX - rocketX) * 0.1;
                }
            }
            
            for (let i = words.length - 1; i >= 0; i--) {
                words[i].y += speed;
                text(words[i].text, words[i].x, words[i].y);
                
                if (words[i].y > borderY) {
                    words.splice(i, 1);
                    lives--;
                    shakeScreen();
                    if (lives <= 0) {
                        gameOver = true;
                    }
                }
            }
            
            for (let i = lasers.length - 1; i >= 0; i--) {
                stroke(255, 0, 0);
                strokeWeight(3);
                line(lasers[i].x1, lasers[i].y1, lasers[i].x2, lasers[i].y2);
                strokeWeight(1);
                lasers[i].lifetime--;
                if (lasers[i].lifetime <= 0) lasers.splice(i, 1);
            }
            
            for (let i = explosions.length - 1; i >= 0; i--) {
                fill(255, 165, 0, explosions[i].lifetime * 12);
                circle(explosions[i].x, explosions[i].y, 50);
                fill(255, 0, 0, explosions[i].lifetime * 12);
                circle(explosions[i].x, explosions[i].y, 30);
                explosions[i].lifetime--;
                if (explosions[i].lifetime <= 0) explosions.splice(i, 1);
            }
        }

        function shootLaser() {
            let wordFound = false;
            for (let i = 0; i < words.length; i++) {
                if (words[i].text.toLowerCase() === userInput.toLowerCase()) {
                    let laserStartX = rocketX;
                    let laserStartY = rocketY - rocketHeight/6;
                    
                    lasers.push({
                        x1: laserStartX, 
                        y1: laserStartY,
                        x2: words[i].x + textWidth(words[i].text)/2,
                        y2: words[i].y,
                        lifetime: 10
                    });
                    explosions.push({ 
                        x: words[i].x + textWidth(words[i].text)/2, 
                        y: words[i].y, 
                        lifetime: 20 
                    });
                    
                    // Play explosion sound
                    explosionSound.play();
                    
                    words.splice(i, 1);
                    score++;
                    userInput = "";
                    wordFound = true;
                    break;
                }
            }
            
            if (!wordFound && userInput.length > 0) {
                shakeScreen();
                userInput = "";
                if (currentDifficulty === "medium" || currentDifficulty === "hard") {
                    lives--;
                    if (lives <= 0) {
                        gameOver = true;
                    }
                }
            }
        }

        function spawnWord() {
            if (gameOver || availableWords.length === 0) return;
            
            if (availableWords.length === 0) {
                availableWords = [...everydayWords];
            }
            
            const randomIndex = Math.floor(Math.random() * availableWords.length);
            const randomWord = availableWords[randomIndex];
            availableWords.splice(randomIndex, 1);
            
            let wordWidth = textWidth(randomWord);
            let minX = 20;
            let maxX = width - wordWidth - 20;
            
            if (maxX < minX) return;
            
            words.push({
                text: randomWord,
                x: random(minX, maxX),
                y: 0
            });
        }

        function shakeScreen() {
            let intensity = 10;
            let duration = 300;
            let start = Date.now();
            let interval = setInterval(() => {
                let elapsed = Date.now() - start;
                if (elapsed > duration) {
                    clearInterval(interval);
                    document.body.style.transform = "translate(0, 0)";
                    return;
                }
                let xOffset = (Math.random() * intensity * 2) - intensity;
                let yOffset = (Math.random() * intensity * 2) - intensity;
                document.body.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            }, 50);
        }

        function keyPressed() {
            if (gameOver) return;
            
            if (keyCode === 8) {
                if (!backspaceInterval) {
                    userInput = userInput.slice(0, -1);
                    backspaceInterval = setTimeout(() => {
                        backspaceInterval = setInterval(() => {
                            if (userInput.length > 0) {
                                userInput = userInput.slice(0, -1);
                            } else {
                                clearInterval(backspaceInterval);
                                backspaceInterval = null;
                            }
                        }, backspaceSpeed);
                    }, backspaceDelay);
                }
                return false;
            } else if (keyCode === 13 || keyCode === 32) {  // Enter or Space
                shootLaser();
                return false;
            } else if (key.length === 1 && key.match(/[a-z]/i)) {
                userInput += key.toLowerCase();
                
                for (let word of words) {
                    if (word.text.toLowerCase().startsWith(userInput.toLowerCase())) {
                        targetX = word.x + textWidth(word.text)/2;
                        break;
                    }
                }
            }
        }

        function keyReleased() {
            if (keyCode === 8 && backspaceInterval) {
                if (backspaceInterval) {
                    clearTimeout(backspaceInterval);
                    if (typeof backspaceInterval === 'number') {
                        clearInterval(backspaceInterval);
                    }
                    backspaceInterval = null;
                }
            }
        }

        function updateTimer() {
            if (timer > 0) {
                timer--;
            } else {
                gameOver = true;
                clearInterval(timerInterval);
            }
        }

        function restartGame() {
            if (currentAudio) {
                currentAudio.stop();
            }
            location.reload();
        }

        function exitGame() {
            if (currentAudio) {
                currentAudio.stop();
            }
            window.history.back();
        }
    </script>
</body>
</html>
